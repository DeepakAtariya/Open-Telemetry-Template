global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  - job_name: otel-api
    static_configs:
      - targets: ['otel-api:9464']

  - job_name: users-service
    static_configs:
      - targets: ['users-service:9464']

  - job_name: notifications-service
    static_configs:
      - targets: ['notifications-service:9464']
